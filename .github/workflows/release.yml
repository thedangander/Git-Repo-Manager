name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_NAME: GitRepoManager

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: GitRepoManager-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: GitRepoManager-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: GitRepoManager-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: GitRepoManager-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "GitRepoManager.slnx"

      - name: Publish
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/${{ matrix.artifact }}

      - name: Create ZIP (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path ./publish/${{ matrix.artifact }}/* -DestinationPath ./publish/${{ matrix.artifact }}.zip

      - name: Create TAR.GZ (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd ./publish
          tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ./publish/${{ matrix.artifact }}.zip
            ./publish/${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Calculate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.tar.gz
            ./artifacts/checksums.txt

  winget-manifest:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GitRepoManager-win-x64
          path: ./artifacts

      - name: Calculate SHA256 for winget
        id: sha256
        run: |
          SHA=$(sha256sum ./artifacts/GitRepoManager-win-x64.zip | cut -d ' ' -f 1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create winget manifest directory
        run: |
          mkdir -p winget-manifest

      - name: Generate winget version manifest
        run: |
          cat > winget-manifest/thedangander.GitRepoManager.yaml << EOF
          PackageIdentifier: thedangander.GitRepoManager
          PackageVersion: ${{ steps.version.outputs.version }}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.12.0
          EOF

      - name: Generate winget locale manifest
        run: |
          cat > winget-manifest/thedangander.GitRepoManager.locale.en-US.yaml << EOF
          PackageIdentifier: thedangander.GitRepoManager
          PackageVersion: ${{ steps.version.outputs.version }}
          PackageLocale: en-US
          Publisher: thedangander
          PublisherUrl: https://github.com/thedangander
          PackageName: Git Repository Manager
          PackageUrl: https://github.com/thedangander/Git-Repo-Manager
          License: MIT
          LicenseUrl: https://github.com/thedangander/Git-Repo-Manager/blob/main/LICENSE
          ShortDescription: A cross-platform terminal app for discovering and managing Git repositories
          Description: |-
            Git Repository Manager scans directories to find Git repositories and displays them in an interactive terminal UI.
            Features include viewing branch status, syncing repos, switching branches, and opening in VS Code or terminal.
          Tags:
            - git
            - cli
            - developer-tools
            - repository
            - terminal
          ManifestType: defaultLocale
          ManifestVersion: 1.12.0
          EOF

      - name: Generate winget installer manifest
        run: |
          cat > winget-manifest/thedangander.GitRepoManager.installer.yaml << EOF
          PackageIdentifier: thedangander.GitRepoManager
          PackageVersion: ${{ steps.version.outputs.version }}
          InstallerType: zip
          Installers:
            - Architecture: x64
              InstallerUrl: https://github.com/thedangander/Git-Repo-Manager/releases/download/v${{ steps.version.outputs.version }}/GitRepoManager-win-x64.zip
              InstallerSha256: ${{ steps.sha256.outputs.sha256 }}
              NestedInstallerType: portable
              NestedInstallerFiles:
                - RelativeFilePath: GitRepoManager.exe
                  PortableCommandAlias: gitrepo
          ManifestType: installer
          ManifestVersion: 1.12.0
          EOF

      - name: Upload winget manifests
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest
          path: winget-manifest/

      - name: Display winget manifests
        run: |
          echo "=== Winget manifests generated ==="
          echo ""
          echo "To submit to winget-pkgs:"
          echo "1. Fork https://github.com/microsoft/winget-pkgs"
          echo "2. Create folder: manifests/t/thedangander/GitRepoManager/${{ steps.version.outputs.version }}/"
          echo "3. Copy these manifest files to that folder"
          echo "4. Submit a PR"
          echo ""
          echo "=== Generated manifests ==="
          cat winget-manifest/*.yaml
